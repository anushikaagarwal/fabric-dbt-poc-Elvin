# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models.
name: 'sales_semantic_models'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'default'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths:
  - "macros"
  - "{{ env_var('CLONED_PROJECT_PATH', '/usr/local/airflow') }}/dags/dbt/dbt_common_packages/macros"
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "{{ env_var('HOME', '/home/astro') }}/dbt/dbt_common_packages"
packages-install-path: "{{ env_var('HOME', '/home/astro') }}/dbt/dbt_common_packages"

# Source freshness upload flag
flags:
  source_freshness_run_project_hooks: True

# ---------------------------------------------------------------------------
# Project-level vars
# ---------------------------------------------------------------------------
# Any project-wide variables should be declared here. Optional Airflow auto-DAG
# configuration is included below (commented out) - flip `auto-dag: true` and
# fill in the `start-date` when the project is ready to be scheduled by the
# repo's `dbt/auto_dag.py` factory.
vars:
  data_quality_enabled: true

  # airflow:
  #   auto-dag: true
  #   dag-id: "sales_semantic_models"
  #   start-date: "2026-07-14"
  #   schedule-interval: "0 5 * * *"
  #   custom-snowflake-conn-id: "eio_snowflake_conn"

  version_prefix: 'v1_0_0'
  dev_database: 'eio_di_workspace'
  dev_schema: 'sales_semantic_models'
  prd_database: 'eio_ingest'
  prd_schema: 'sales_transform'

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------
sources:
  +tags: ['sales', 'sales_semantic_models']

# ---------------------------------------------------------------------------
# Models
# ---------------------------------------------------------------------------
# Follows the repo-standard Transform -> Publish (shared/private) layout.
# The `semantic_models/` folder hosts dbt Semantic Layer YAML definitions
# (semantic models, entities, dimensions, measures, metrics) that reference
# the marts materialized under `publish/shared/`.
models:
  +transient: false
  +persist_docs:
    relation: true
    columns: true

  # see docs: https://docs.elementary-data.com/
  elementary:
    # elementary models will be created in the schema '<your_schema>_elementary'
    +database: eio_ingest
    +schema: elementary_log

  +tags: ['sales', 'sales_semantic_models']

  # Be sure to namespace your model configs to your project name.
  #
  # Materialization: ephemeral is the project-wide default for transform and
  # publish per the team's Analytics Engineering Enablement Guide (see
  # knowledge_base/conventions.md). Ephemeral models are compiled as CTEs
  # into downstream queries and do not materialize physical objects. To opt
  # OUT (e.g. a mart that must be a table for BI Direct Lake), override in
  # the model file: {{ config(materialized='table') }} with a one-line
  # justification comment. The +database and +schema settings below are
  # retained so opt-outs land in the correct Snowflake location.
  sales_semantic_models:
    transform:
      +enabled: true
      +materialized: ephemeral
      +database: eio_ingest
      +schema: sales_transform

    publish:
      +enabled: true
      +materialized: ephemeral
      +database: eio_publish
      shared:
        +schema: sales_shared
      private:
        +schema: sales_private

    # Semantic Layer definitions (YAML only - no SQL is materialized here).
    # Enabling this key ensures dbt registers the semantic models declared in
    # models/metrics/ and applies the project tag for lineage/tests.
    metrics:
      +enabled: true

# ---------------------------------------------------------------------------
# Seeds
# ---------------------------------------------------------------------------
seeds:
  +tags: ['sales', 'sales_semantic_models', 'seeds']
  +persist_docs:
    relation: true
    columns: true
  sales_semantic_models:
    +enabled: true
    +database: eio_ingest
    +schema: sales_transform
    +full_refresh: true

# ---------------------------------------------------------------------------
# Tests
# ---------------------------------------------------------------------------
tests:
  +store_failures: true       # persist test failure rows in the test log schema
  +schema: "sales_test_log"
  +tags: ['sales', 'sales_semantic_models']
