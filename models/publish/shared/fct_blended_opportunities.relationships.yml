fact: fct_blended_opportunities
grain: one row per (source_system, opportunity_number, line_item_number)
relationships:
  - name: to_opportunity
    to_model: dim_unified_opportunity
    from_column: opportunity_number
    to_column: opportunity_number
    cardinality: many_to_one
    cross_filter_direction: single
    is_active: true
  - name: to_account
    to_model: dim_unified_account
    from_column: account_csn
    to_column: account_csn
    cardinality: many_to_one
    cross_filter_direction: single
    is_active: true
  - name: to_partner_account
    to_model: dim_unified_account
    from_column: partner_csn
    to_column: account_csn
    cardinality: many_to_one
    cross_filter_direction: single
    is_active: false
    role: partner_account
  - name: to_opportunity_owner
    to_model: dim_unified_employee
    from_column: opportunity_owner_id
    to_column: employee_id
    cardinality: many_to_one
    cross_filter_direction: single
    is_active: true
    role: opportunity_owner
  - name: to_account_owner
    to_model: dim_unified_employee
    from_column: account_owner_id
    to_column: employee_id
    cardinality: many_to_one
    cross_filter_direction: single
    is_active: false
    role: account_owner
  - name: to_projected_close_date
    to_model: dim_date
    from_column: opportunity_projected_close_date
    to_column: date_day
    cardinality: many_to_one
    cross_filter_direction: single
    is_active: true
    role: projected_close_date
