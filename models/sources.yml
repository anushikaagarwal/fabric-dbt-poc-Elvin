version: 2

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------
# Repo convention: source `name:` == Snowflake schema name.
# Freshness is intentionally omitted on the initial POC declarations - add
# `freshness:` + `loaded_at_field:` per table when SLAs are confirmed.
sources:
  # Enterprise Data Hub (EDH) publish - single source of truth for
  # enterprise opportunity, line item, account, offering, country,
  # employee, quote, and FX data.
  - name: edh_shared
    database: edh_publish
    schema: edh_shared
    tables:
      - name: opportunity
      - name: opportunity_line_item
      - name: offering
      - name: account_ced
      - name: country
      - name: employee
      - name: quote
      - name: monthly_exchange_rate
      - name: opportunity_task
      - name: employee_ced
      - name: finance_calendar

  # EDH customer-private publish - restricted-access customer contact PII.
  - name: edh_customer_private
    database: edh_publish
    schema: edh_customer_private
    tables:
      - name: contact

  # Business Systems & Data (BSD) publish - Salesforce replica used to
  # enrich EDH opportunities with SFDC-only fields (e.g. opportunity tags).
  - name: sfdc_shared
    database: bsd_publish
    schema: sfdc_shared
    tables:
      - name: opportunity

  # Autodesk Construction Solutions (ACS) Salesforce publish - source of
  # construction-domain opportunities that don't yet have an EDH counterpart.
  - name: dw_salesforce
    database: construction_publish
    schema: dw_salesforce
    tables:
      - name: dim_salesforce_opportunities
      - name: dim_salesforce_sales_opportunity_line_items
      - name: dim_salesforce_accounts
      - name: dim_salesforce_users
      - name: dim_salesforce_task
      - name: dim_salesforce_contact

  # ACS RevOps publish - reference/staging tables for construction
  # geo mapping.
  - name: dw_revops
    database: construction_publish
    schema: dw_revops
    tables:
      - name: stg_revops_country_region_map
