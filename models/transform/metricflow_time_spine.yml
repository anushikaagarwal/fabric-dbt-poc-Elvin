version: 2

models:
  - name: metricflow_time_spine
    description: >
      Daily calendar spine used by MetricFlow / dbt Semantic Layer for
      time-based metric queries and gap-free time series. Not a business
      dimension - do not join to it from transform or publish models.
      Range: 2015-01-01 through 2040-01-01 (covers historical opportunity
      close dates and future pipeline). Opts out of the project-wide
      ephemeral default because MetricFlow requires a physical relation.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: Calendar date, day grain.
        granularity: day
